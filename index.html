<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Santiago’s Seroquel XR Dose at 300mg</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1f4b5c" />
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Santiago’s Seroquel XR Dose at 300mg</h1>
    <p class="sub">Simple daily tracking in 24-hour time only. Stored privately on your device.</p>
  </header>

  <main>
    <section class="card">
      <h2>Night dose</h2>
      <p class="note">Use 24-hour time only everywhere in this app.</p>
      <div class="grid two">
        <label>
          Date for this night
          <input type="date" id="nightDate" />
        </label>
        <label>
          Medication time (24-hour)
          <input type="text" id="medTime" inputmode="numeric" autocomplete="off" spellcheck="false" maxlength="5" placeholder="21:30" aria-describedby="medTimeHelp" />
          <small id="medTimeHelp" class="note">Enter exactly HH:MM in 24-hour time, for example 21:30.</small>
        </label>
      </div>
      <div class="inline-row">
        <button id="markNA" class="secondary">Mark NA / did not take</button>
        <span id="naStatus" class="note"></span>
      </div>

      <h3>Late night eating</h3>
      <div class="grid three">
        <label>
          Food time (24-hour)
          <input type="time" id="foodTime" />
        </label>
        <label class="span-2">
          What it was
          <input type="text" id="foodWhat" placeholder="Example: pizza, ice cream, fries" />
        </label>
      </div>
      <div class="inline-row">
        <button id="addFood" class="secondary">Add food item</button>
      </div>
      <ul id="foodList" class="chips"></ul>

      <div class="inline-row top-gap">
        <button id="saveNight">Save night entry</button>
        <button id="resetNight" class="secondary">Clear form</button>
      </div>
    </section>

    <section class="card">
      <h2>Next day check-in</h2>
      <div class="grid two">
        <label>
          Morning date
          <input type="date" id="dayDate" />
        </label>
        <label>
          Wake-up time (24-hour)
          <input type="time" id="wakeTime" />
        </label>
      </div>

      <p class="note">Drowsiness scale: 5 = super tired, 0 = not tired at all.</p>
      <div class="grid four">
        <label>
          11:00
          <input type="number" id="d11" min="0" max="5" step="1" placeholder="0-5" />
        </label>
        <label>
          12:00
          <input type="number" id="d12" min="0" max="5" step="1" placeholder="0-5" />
        </label>
        <label>
          15:00
          <input type="number" id="d15" min="0" max="5" step="1" placeholder="0-5" />
        </label>
        <label>
          17:00
          <input type="number" id="d17" min="0" max="5" step="1" placeholder="0-5" />
        </label>
      </div>

      <div class="inline-row top-gap">
        <button id="saveDay">Save day entry</button>
        <button id="resetDay" class="secondary">Clear form</button>
      </div>
    </section>

        <section class="card">
      <div class="inline-row between">
        <h2>Saved entries</h2>
        <div class="inline-row wrap">
          <button id="exportCSV" class="secondary">Export CSV</button>
          <button id="exportJSON" class="secondary">Export JSON</button>
          <button id="clearAll" class="danger">Clear all data</button>
        </div>
      </div>
      <div id="entries"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
